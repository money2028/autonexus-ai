<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNexus AI - 工作流编辑器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; color: #334155; }
        .container { display: flex; height: 100vh; }
        /* 左侧节点库 */
        .sidebar { width: 280px; background: white; border-right: 1px solid #e2e8f0; padding: 1.5rem; overflow-y: auto; }
        .sidebar h2 { font-size: 1.3rem; margin-bottom: 1.5rem; color: #1e3a8a; }
        .node-item { background: #f1f5f9; border: 2px dashed #cbd5e1; border-radius: 0.75rem; padding: 1rem; margin-bottom: 1rem; cursor: grab; text-align: center; transition: all 0.2s; }
        .node-item:hover { background: #e0f2fe; border-color: #3b82f6; }
        .node-item i { font-size: 1.5rem; color: #3b82f6; margin-bottom: 0.5rem; }
        /* 中间画布 */
        .canvas-container { flex: 1; position: relative; overflow: auto; background: #f8fafc url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHZpZXdCb3g9IjAgMCA0MCA0MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxyZWN0IHN0cm9rZT0iI0UyRThGMCIgc3Ryb2tlLXdpZHRoPSIxIiB4PSIuNSIgeT0iLjUiIHdpZHRoPSIzOSIgaGVpZ2h0PSIzOSIvPjwvZz48L3N2Zz4='); }
        #canvas { min-width: 2000px; min-height: 2000px; position: relative; }
        .node { position: absolute; width: 180px; background: white; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.08); padding: 1.2rem; cursor: move; border-left: 5px solid #3b82f6; }
        .node-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
        .node-title { font-weight: bold; color: #1e3a8a; }
        .node-delete { color: #ef4444; cursor: pointer; }
        .node-content { font-size: 0.9rem; color: #64748b; }
        .node-input, .node-output { position: absolute; width: 12px; height: 12px; background: #10b981; border-radius: 50%; }
        .node-input { left: -6px; top: 50%; }
        .node-output { right: -6px; top: 50%; }
        .connection { stroke: #3b82f6; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
        /* 右侧属性面板 */
        .properties { width: 320px; background: white; border-left: 1px solid #e2e8f0; padding: 1.5rem; overflow-y: auto; }
        .properties h2 { font-size: 1.3rem; margin-bottom: 1.5rem; color: #1e3a8a; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #475569; }
        input, textarea, select { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; font-family: inherit; }
        textarea { min-height: 100px; resize: vertical; }
        .btn { background: #3b82f6; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #2563eb; }
        .btn-secondary { background: #94a3b8; }
        .btn-secondary:hover { background: #64748b; }
        .status-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; color: #cbd5e1; padding: 0.75rem 1.5rem; font-size: 0.9rem; display: flex; justify-content: space-between; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 1rem; padding: 2rem; max-width: 500px; width: 90%; }
        .modal h3 { margin-bottom: 1rem; color: #1e3a8a; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧节点库 -->
        <div class="sidebar">
            <h2><i class="fas fa-shapes"></i> 节点库</h2>
            <div class="node-item" data-type="trigger">
                <i class="fas fa-play"></i>
                <div>触发器</div>
                <small>新消息到达时</small>
            </div>
            <div class="node-item" data-type="reply">
                <i class="fas fa-reply"></i>
                <div>回复消息</div>
                <small>发送文本回复</small>
            </div>
            <div class="node-item" data-type="condition">
                <i class="fas fa-code-branch"></i>
                <div>条件分支</div>
                <small>根据内容判断</small>
            </div>
            <div class="node-item" data-type="api">
                <i class="fas fa-cloud"></i>
                <div>API调用</div>
                <small>请求外部接口</small>
            </div>
            <div class="node-item" data-type="delay">
                <i class="fas fa-clock"></i>
                <div>延迟等待</div>
                <small>暂停一段时间</small>
            </div>
            <div class="node-item" data-type="end">
                <i class="fas fa-flag-checkered"></i>
                <div>结束节点</div>
                <small>流程结束</small>
            </div>
        </div>

        <!-- 中间画布 -->
        <div class="canvas-container">
            <svg id="connections" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;"></svg>
            <div id="canvas">
                <!-- 节点将通过JS动态添加 -->
            </div>
        </div>

        <!-- 右侧属性面板 -->
        <div class="properties">
            <h2><i class="fas fa-sliders-h"></i> 属性</h2>
            <div id="property-form">
                <p style="color: #94a3b8;">选择节点以编辑属性</p>
            </div>
            <div class="form-group">
                <button class="btn" id="save-workflow"><i class="fas fa-save"></i> 保存工作流</button>
                <button class="btn btn-secondary" id="load-workflow"><i class="fas fa-folder-open"></i> 加载工作流</button>
                <button class="btn btn-secondary" id="export-json"><i class="fas fa-file-export"></i> 导出JSON</button>
            </div>
            <div class="form-group">
                <h3>工作流说明</h3>
                <textarea id="workflow-description" placeholder="描述此工作流的用途..."></textarea>
            </div>
        </div>
    </div>

    <!-- 状态栏 -->
    <div class="status-bar">
        <div>AutoNexus AI 工作流编辑器 | 节点数: <span id="node-count">0</span> | 连接数: <span id="connection-count">0</span></div>
        <div>状态: <span id="editor-status" style="color: #10b981;">就绪</span></div>
    </div>

    <!-- 导出模态框 -->
    <div class="modal" id="export-modal">
        <div class="modal-content">
            <h3>工作流 JSON 配置</h3>
            <textarea id="json-output" style="width: 100%; height: 300px; font-family: monospace;"></textarea>
            <div style="margin-top: 1rem; text-align: right;">
                <button class="btn" id="copy-json">复制</button>
                <button class="btn btn-secondary" id="close-modal">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // 全局状态
        let nodes = {};
        let connections = [];
        let selectedNodeId = null;
        let nodeCounter = 0;
        let isDragging = false;
        let dragOffset = { x: 0, y: 0 };
        let connectingFrom = null;

        // 节点模板
        const nodeTemplates = {
            trigger: { title: '触发器', icon: 'play', color: '#10b981', defaults: { event: 'message.received' } },
            reply: { title: '回复消息', icon: 'reply', color: '#3b82f6', defaults: { text: '您好，请问有什么可以帮您？' } },
            condition: { title: '条件分支', icon: 'code-branch', color: '#f59e0b', defaults: { field: 'content', operator: 'contains', value: '' } },
            api: { title: 'API调用', icon: 'cloud', color: '#8b5cf6', defaults: { url: 'https://api.example.com', method: 'GET' } },
            delay: { title: '延迟等待', icon: 'clock', color: '#6b7280', defaults: { seconds: 5 } },
            end: { title: '结束节点', icon: 'flag-checkered', color: '#ef4444', defaults: { reason: '流程结束' } }
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initSidebar();
            initCanvas();
            initProperties();
            initButtons();
            updateStatus();
        });

        // 左侧节点库拖拽
        function initSidebar() {
            const nodeItems = document.querySelectorAll('.node-item');
            nodeItems.forEach(item => {
                item.addEventListener('dragstart', e => {
                    e.dataTransfer.setData('type', item.dataset.type);
                });
            });

            const canvas = document.getElementById('canvas');
            canvas.addEventListener('dragover', e => e.preventDefault());
            canvas.addEventListener('drop', e => {
                e.preventDefault();
                const type = e.dataTransfer.getData('type');
                if (!type) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left - 90;
                const y = e.clientY - rect.top - 40;
                addNode(type, x, y);
            });
        }

        // 添加节点
        function addNode(type, x, y) {
            const id = 'node_' + (++nodeCounter);
            const template = nodeTemplates[type];
            const node = document.createElement('div');
            node.className = 'node';
            node.id = id;
            node.style.left = x + 'px';
            node.style.top = y + 'px';
            node.style.borderLeftColor = template.color;
            node.innerHTML = `
                <div class="node-header">
                    <div class="node-title"><i class="fas fa-${template.icon}"></i> ${template.title}</div>
                    <div class="node-delete" onclick="deleteNode('${id}')"><i class="fas fa-times"></i></div>
                </div>
                <div class="node-content" id="content_${id}">${getNodeSummary(type, template.defaults)}</div>
                <div class="node-input" onmousedown="startConnection('${id}', 'input')"></div>
                <div class="node-output" onmousedown="startConnection('${id}', 'output')"></div>
            `;
            document.getElementById('canvas').appendChild(node);
            nodes[id] = { id, type, x, y, ...template.defaults };
            makeDraggable(node);
            updateStatus();
            selectNode(id);
        }

        function getNodeSummary(type, defaults) {
            const summaries = {
                trigger: `事件: ${defaults.event}`,
                reply: `回复: ${defaults.text.substring(0, 30)}...`,
                condition: `条件: ${defaults.field} ${defaults.operator} ...`,
                api: `调用: ${defaults.method} ${defaults.url.substring(0, 30)}...`,
                delay: `等待: ${defaults.seconds} 秒`,
                end: `结束: ${defaults.reason}`
            };
            return summaries[type] || '配置节点属性';
        }

        // 使节点可拖拽
        function makeDraggable(element) {
            element.addEventListener('mousedown', e => {
                if (e.target.closest('.node-delete') || e.target.classList.contains('node-input') || e.target.classList.contains('node-output')) return;
                isDragging = true;
                const rect = element.getBoundingClientRect();
                dragOffset.x = e.clientX - rect.left;
                dragOffset.y = e.clientY - rect.top;
                selectNode(element.id);
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        }

        function onMouseMove(e) {
            if (!isDragging) return;
            const canvas = document.getElementById('canvas');
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left - dragOffset.x;
            const y = e.clientY - rect.top - dragOffset.y;
            const node = document.getElementById(selectedNodeId);
            node.style.left = x + 'px';
            node.style.top = y + 'px';
            nodes[selectedNodeId].x = x;
            nodes[selectedNodeId].y = y;
            updateConnections();
        }

        function onMouseUp() {
            isDragging = false;
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
        }

        // 连接节点
        function startConnection(nodeId, direction) {
            connectingFrom = { nodeId, direction };
            document.addEventListener('mousemove', drawTemporaryConnection);
            document.addEventListener('mouseup', finishConnection);
        }

        function drawTemporaryConnection(e) {
            // 可视化临时连线（略）
        }

        function finishConnection(e) {
            if (!connectingFrom) return;
            document.removeEventListener('mousemove', drawTemporaryConnection);
            document.removeEventListener('mouseup', finishConnection);
            connectingFrom = null;
            updateConnections();
        }

        function updateConnections() {
            // 更新SVG连线（简化）
            document.getElementById('connection-count').textContent = connections.length;
        }

        // 节点选择与属性面板
        function selectNode(id) {
            if (selectedNodeId) {
                document.getElementById(selectedNodeId).style.boxShadow = '0 10px 25px rgba(0,0,0,0.08)';
            }
            selectedNodeId = id;
            document.getElementById(id).style.boxShadow = '0 10px 25px rgba(59, 130, 246, 0.4)';
            updatePropertyForm();
        }

        function updatePropertyForm() {
            const form = document.getElementById('property-form');
            if (!selectedNodeId || !nodes[selectedNodeId]) {
                form.innerHTML = '<p style="color: #94a3b8;">选择节点以编辑属性</p>';
                return;
            }
            const node = nodes[selectedNodeId];
            const template = nodeTemplates[node.type];
            let html = `<h3>${template.title}</h3>`;
            if (node.type === 'reply') {
                html += `
                    <div class="form-group">
                        <label>回复内容</label>
                        <textarea id="prop-text" oninput="updateNodeProperty('text', this.value)">${node.text || ''}</textarea>
                    </div>
                `;
            } else if (node.type === 'condition') {
                html += `
                    <div class="form-group">
                        <label>字段</label>
                        <input type="text" id="prop-field" value="${node.field || ''}" oninput="updateNodeProperty('field', this.value)">
                    </div>
                    <div class="form-group">
                        <label>操作符</label>
                        <select id="prop-operator" onchange="updateNodeProperty('operator', this.value)">
                            <option value="contains" ${node.operator === 'contains' ? 'selected' : ''}>包含</option>
                            <option value="equals" ${node.operator === 'equals' ? 'selected' : ''}>等于</option>
                            <option value="startsWith" ${node.operator === 'startsWith' ? 'selected' : ''}>开头为</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>值</label>
                        <input type="text" id="prop-value" value="${node.value || ''}" oninput="updateNodeProperty('value', this.value)">
                    </div>
                `;
            } else if (node.type === 'api') {
                html += `
                    <div class="form-group">
                        <label>URL</label>
                        <input type="text" id="prop-url" value="${node.url || ''}" oninput="updateNodeProperty('url', this.value)">
                    </div>
                    <div class="form-group">
                        <label>方法</label>
                        <select id="prop-method" onchange="updateNodeProperty('method', this.value)">
                            <option value="GET" ${node.method === 'GET' ? 'selected' : ''}>GET</option>
                            <option value="POST" ${node.method === 'POST' ? 'selected' : ''}>POST</option>
                            <option value="PUT" ${node.method === 'PUT' ? 'selected' : ''}>PUT</option>
                        </select>
                    </div>
                `;
            } else {
                html += `<p>暂无更多配置项。</p>`;
            }
            form.innerHTML = html;
        }

        function updateNodeProperty(key, value) {
            if (!selectedNodeId) return;
            nodes[selectedNodeId][key] = value;
            // 更新节点显示摘要
            const node = nodes[selectedNodeId];
            const template = nodeTemplates[node.type];
            document.getElementById(`content_${selectedNodeId}`).textContent = getNodeSummary(node.type, node);
        }

        function deleteNode(id) {
            if (confirm('确定删除此节点？')) {
                document.getElementById(id).remove();
                delete nodes[id];
                connections = connections.filter(c => c.from !== id && c.to !== id);
                if (selectedNodeId === id) selectedNodeId = null;
                updateStatus();
                updatePropertyForm();
                updateConnections();
            }
        }

        // 按钮功能
        function initButtons() {
            document.getElementById('save-workflow').addEventListener('click', () => {
                alert('保存功能需后端支持，当前仅本地演示。');
            });
            document.getElementById('export-json').addEventListener('click', () => {
                const workflow = {
                    name: 'AutoNexus 工作流',
                    description: document.getElementById('workflow-description').value,
                    nodes: Object.values(nodes),
                    connections: connections,
                    exportedAt: new Date().toISOString()
                };
                document.getElementById('json-output').value = JSON.stringify(workflow, null, 2);
                document.getElementById('export-modal').style.display = 'flex';
            });
            document.getElementById('copy-json').addEventListener('click', () => {
                const textarea = document.getElementById('json-output');
                textarea.select();
                document.execCommand('copy');
                alert('已复制到剪贴板');
            });
            document.getElementById('close-modal').addEventListener('click', () => {
                document.getElementById('export-modal').style.display = 'none';
            });
        }

        function updateStatus() {
            document.getElementById('node-count').textContent = Object.keys(nodes).length;
            document.getElementById('connection-count').textContent = connections.length;
        }

        // 公开函数供HTML调用
        window.startConnection = startConnection;
        window.deleteNode = deleteNode;
        window.updateNodeProperty = updateNodeProperty;
    </script>
</body>
</html>
